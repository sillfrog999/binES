<!DOCTYPE html>

<html>

<head>

<title>binES Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

</head>



<body>


<nav>


<h2>
binES
</h2>


<div>


<a href="/profile">
Profile
</a>


<a href="/logout">
Logout
</a>


</div>


</nav>





<div class="container">


<h1>
Dashboard
</h1>


<p>
Welcome 
<b>
{{current_user.username}}
</b>
</p>




<a class="btn" href="/create">

+ New Project

</a>






<div class="projects">



{% if projects %}



{% for p in projects %}



<div class="card">



<a href="/project/{{p.id}}"
style="text-decoration:none;color:white;">


<h2>

{{p.name}}

</h2>


</a>




<p>

Status:

<span class="status">

{{p.status}}

</span>


</p>





<p>

File:

{{p.file}}

</p>






<a class="btn"
href="/project/{{p.id}}">

Open

</a>





<a class="delete"
href="/delete/{{p.id}}">

Delete

</a>




</div>



{% endfor %}




{% else %}


<div class="card">


<h2>
No projects
</h2>


<p>
Create your first project with binES
</p>


</div>



{% endif %}





</div>



</div>



</body>


</html>
